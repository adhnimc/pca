<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCA Raw vs Rank</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <h1>PCA: raw values vs rank PCA</h1>
    <p class="sub">Compare PCA on scaled raw values against rank-based PCA from the same dataset.</p>

    <section class="panel controls">
      <label>Dataset
        <select id="dataset">
          <option value="sim">Simulated</option>
          <option value="iris">Iris</option>
          <option value="wine">Wine</option>
        </select>
      </label>
      <label>Observations (sim only) <input id="n" type="number" min="80" max="500" step="10" value="200"></label>
      <label>Noise (sim only) <input id="noise" type="number" min="0.05" max="1.00" step="0.05" value="0.30"></label>
      <label>Outliers (sim only) <input id="outliers" type="number" min="0" max="30" step="1" value="8"></label>
      <label><input id="color" type="checkbox" checked> color classes/outliers</label>
      <button id="rerun">Update</button>
    </section>

    <section class="stats">
      <div class="card"><div class="k">Corr PC1</div><div id="c1" class="v">—</div></div>
      <div class="card"><div class="k">Corr PC2</div><div id="c2" class="v">—</div></div>
      <div class="card"><div class="k">Raw var</div><div id="rv" class="v">—</div></div>
      <div class="card"><div class="k">Rank var</div><div id="sv" class="v">—</div></div>
    </section>

    <section class="grid2">
      <div class="panel">
        <h2>PC1 comparison</h2>
        <svg id="pc1" viewBox="0 0 520 420"></svg>
      </div>
      <div class="panel">
        <h2>PC2 comparison</h2>
        <svg id="pc2" viewBox="0 0 520 420"></svg>
      </div>
      <div class="panel">
        <h2>Raw PCA biplot</h2>
        <svg id="raw" viewBox="0 0 520 420"></svg>
      </div>
      <div class="panel">
        <h2>Rank PCA biplot</h2>
        <svg id="rank" viewBox="0 0 520 420"></svg>
      </div>
    </section>

    <section class="panel">
      <h2>Loadings</h2>
      <table id="tbl"><thead><tr><th>Variable</th><th>Raw PC1</th><th>Raw PC2</th><th>Rank PC1</th><th>Rank PC2</th></tr></thead><tbody></tbody></table>
    </section>
  </main>
  <script src="iris.js"></script>
  <script src="wine.js"></script>
  <script src="script.js"></script>
</body>
</html>
